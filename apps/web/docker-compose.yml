services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wyceny
    ports:
      - "5432:5432"
    volumes:
      - wyceny_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wyceny"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  wyceny_postgres_data:
